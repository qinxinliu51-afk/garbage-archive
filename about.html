<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me | Garbage Museum</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f5f2;
            --text-main: #000;
            --text-sub: #666;
            --line-color: #ccc;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- 导航栏 --- */
        .nav { 
            position: fixed; top: 0; width: 100%; height: 80px;
            display: flex; justify-content: center; align-items: center;
            gap: 60px; z-index: 9000; background: rgba(247, 245, 242, 0.7);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            transition: opacity 0.8s ease;
        }
        .nav a { 
            font-family: 'Space Mono', monospace; font-size: 12px; text-decoration: none; 
            color: #888; letter-spacing: 3px; text-transform: uppercase;
            transition: all 0.3s ease; padding: 10px 15px; line-height: 1; font-weight: 400;
        }
        .nav a:hover { color: #000; }
        .nav a.active { color: #222; font-weight: 700; border-bottom: 2px solid #222; }

        /* --- 关于页面布局 --- */
        .about-section {
            display: flex; min-height: 100vh; width: 100%;
            align-items: center; justify-content: center;
            padding: 100px 5% 80px 5%; box-sizing: border-box;
            transition: opacity 1s ease; 
        }

        .visual-side { flex: 1; height: 600px; position: relative; cursor: grab; }
        .content-side { flex: 1; padding-left: 60px; max-width: 600px; }
        .hi-tag { font-family: 'Space Mono', monospace; font-size: 48px; font-weight: 700; margin: 0; display: flex; align-items: baseline; gap: 20px; }
        .name-en { font-size: 42px; font-weight: 700; text-transform: uppercase; margin-bottom: 20px; border-bottom: 1px solid var(--line-color); padding-bottom: 15px; }
        .description { font-family: 'Space Mono', monospace; font-size: 16px; line-height: 1.8; color: var(--text-sub); margin-bottom: 30px; }

        .enter-btn {
            display: inline-block; margin-top: 40px; padding: 12px 30px;
            background: #000; color: #fff; text-decoration: none;
            font-family: 'Space Mono', monospace; font-size: 14px;
            border-radius: 4px; transition: all 0.3s; border: 1px solid #000;
            cursor: pointer;
        }
        .enter-btn:hover { background: transparent; color: #000; }

        /* --- 转场元素 --- */
        #transition-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9999; overflow: hidden;
        }

        .trans-book {
            position: absolute; bottom: -400px; 
            background-image: url('book.png'); 
            background-size: contain; background-repeat: no-repeat;
            transition: transform 1.6s cubic-bezier(0.22, 1, 0.36, 1), opacity 1.2s ease;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.15));
        }

        @media (max-width: 968px) {
            .about-section { flex-direction: column; padding-top: 120px; }
            .visual-side { width: 100%; height: 300px; }
            .content-side { padding-left: 0; padding-top: 40px; text-align: center; }
        }
    </style>
</head>
<body>

    <nav class="nav" id="nav">
        <a href="index.html">HOME</a>
        <a href="collection.html">COLLECTION</a> 
        <a href="#" class="active">me</a>
    </nav>

    <div id="transition-overlay"></div>

    <section class="about-section" id="main-content">
        <div class="visual-side" id="model-container"></div>
        <div class="content-side">
            <h1 class="hi-tag">HI , <span>:]</span></h1>
            <p style="font-family:'Space Mono'; font-size:16px; margin-bottom:5px;">欢迎来到</p>
            <div class="name-en">LQX的档案馆</div>
            <div class="description">
                <pre>
档案馆馆藏：
 ·被锁住的
 ·哑巴小狗
 ·一角又一角
 ·一只小熊
 ·已过期
                </pre>
            </div>
            <a href="javascript:void(0)" class="enter-btn" id="start-transition">进入档案馆</a>
        </div>
    </section>

    <script type="importmap">
        { "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js", 
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" 
        } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Three.js 模型渲染 ---
        const container = document.getElementById('model-container');
        const scene = new THREE.Scene();
        
        // 视角调整：如果想让模型看起来更远/更近，可以调整这里的 z 值
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 0, 8); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; 
        controls.enableZoom = false;

        // 环境光增强
        scene.add(new THREE.AmbientLight(0xffffff, 2.5));
        
        // 添加一个平行光让模型更有立体感
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);

        const loader = new GLTFLoader();
        loader.load('dairy.glb', (gltf) => {
            const model = gltf.scene;

            // ==========================================
            // 在这里调整模型的大小和位置
            // ==========================================
            
            // 1. 缩放大小 (x, y, z) 1为原始大小，2为两倍，0.5为一半
            model.scale.set(30, 30, 30); 

            // 2. 位置 (x, y, z) x:左右, y:上下, z:前后
            // 例如：想往上移一点，就把第二个值改成 0.5 或更高
            model.position.set(0, 0, 0); 

            // 3. 初始旋转角度 (弧度制)
            // 如果想侧放，可以调整这里的数值
            model.rotation.set(1, 1, 0); 

            // ==========================================

            scene.add(model);
        }, undefined, (error) => {
            console.error('模型加载失败，显示占位立方体', error);
            const geometry = new THREE.IcosahedronGeometry(2, 0);
            const material = new THREE.MeshNormalMaterial({ wireframe: true });
            scene.add(new THREE.Mesh(geometry, material));
        });

        function animate() { 
            requestAnimationFrame(animate); 
            controls.update(); 
            renderer.render(scene, camera); 
        }
        animate();

        // --- 转场逻辑 ---
        let seed = 12345;
        function seededRandom() {
            seed = (seed * 9301 + 49297) % 233280;
            return seed / 233280;
        }

        const startBtn = document.getElementById('start-transition');
        const overlay = document.getElementById('transition-overlay');
        const mainContent = document.getElementById('main-content');
        const nav = document.getElementById('nav');

        startBtn.addEventListener('click', () => {
            seed = 12345;
            const bookCount = 28; 
            
            mainContent.style.opacity = '0';
            nav.style.opacity = '0';
            mainContent.style.pointerEvents = 'none';

            for (let i = 0; i < bookCount; i++) {
                const book = document.createElement('div');
                book.className = 'trans-book';
                
                const size = 150 + seededRandom() * 200; 
                const left = seededRandom() * 100;
                const rotation = (seededRandom() - 0.5) * 60;
                
                book.style.width = `${size}px`;
                book.style.height = `${size * 1.3}px`;
                book.style.left = `${left}vw`;
                book.style.zIndex = 10000 + i;
                overlay.appendChild(book);
                
                setTimeout(() => {
                    const targetY = -(seededRandom() * 120 + 110); 
                    const driftX = (seededRandom() - 0.5) * 400;
                    book.style.transform = `translate(${driftX}px, ${targetY}vh) rotate(${rotation * 2}deg)`;
                    book.style.opacity = '0';
                }, i * 30);
            }

            setTimeout(() => {
                window.location.href = "archive.html";
            }, 1600); 
        });

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
